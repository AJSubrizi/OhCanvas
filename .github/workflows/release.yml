name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            arch: aarch64
            bundleName: macos
            bundles: "dmg,app"
          - target: x86_64-apple-darwin
            os: macos-15
            arch: x86_64
            bundleName: macos
            bundles: "dmg,app"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
            bundleName: windows
            bundles: msi
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            arch: x86_64
            bundleName: linux
            bundles: "deb,appimage"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Tauri 2 webview + system tray; cmake/clang for llama.cpp and whisper.cpp
          # native build scripts bundled in the LLM and STT plugins.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            build-essential \
            cmake \
            clang

      - name: Install deps
        run: pnpm install

      # Build the sidecar Node.js binary per target triple and drop it where
      # Tauri's externalBin resolver expects it. Tauri's build script errors
      # out hard if the binary is missing, so this must run before `tauri build`.
      # @lydell/node-pty ships native prebuilds as platform-specific packages
      # in optionalDependencies; `bun build --compile` doesn't follow those
      # by default, so we install them as direct deps for the build only.
      # Cross-platform binary naming matches Tauri's externalBin convention:
      #   ohcanvas-sidecar-<target-triple>[.exe]
      - name: Install Bun
        if: runner.os != 'Windows'
        run: npm install -g bun
      - name: Install Bun (Windows)
        if: runner.os == 'Windows'
        run: npm install -g bun
        shell: pwsh

      - name: Install node-pty platform package
        run: |
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)  pkg="@lydell/node-pty-darwin-arm64" ;;
            x86_64-apple-darwin)   pkg="@lydell/node-pty-darwin-x64" ;;
            x86_64-pc-windows-msvc) pkg="@lydell/node-pty-win32-x64" ;;
            x86_64-unknown-linux-gnu) pkg="@lydell/node-pty-linux-x64" ;;
          esac
          cd sidecar
          pnpm add "$pkg"

      - name: Build sidecar binary
        run: |
          mkdir -p ../src-tauri/binaries
          triple="${{ matrix.target }}"
          case "$triple" in
            aarch64-apple-darwin)
              bun_target="bun-arm64-darwin"
              ext=""
              ;;
            x86_64-apple-darwin)
              bun_target="bun-x64-darwin"
              ext=""
              ;;
            x86_64-pc-windows-msvc)
              bun_target="bun-x64-windows"
              ext=".exe"
              ;;
            x86_64-unknown-linux-gnu)
              bun_target="bun-x64-linux"
              ext=""
              ;;
            *)
              echo "Unsupported sidecar target: $triple" >&2
              exit 1
              ;;
          esac
          cd sidecar
          bun build --compile --target="$bun_target" \
            --outfile="../src-tauri/binaries/ohcanvas-sidecar-${triple}${ext}" \
            src/index.ts

      - name: Build
        run: pnpm tauri build --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CXXFLAGS: "-D_LIBCPP_DISABLE_AVAILABILITY"
          CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

      - name: List bundle files
        shell: bash
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f
          echo "=== End ==="

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.bundleName }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz*

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.bundleName }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.bundleName }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OhCanvas-*
          merge-multiple: false

      - name: Flatten bundle files
        shell: bash
        run: |
          for dir in OhCanvas-*/; do
            echo "=== Processing $dir ==="
            ls -laR "$dir" | head -20
            os_arch="${dir#OhCanvas-}"
            os_arch="${os_arch%/}"
            os="${os_arch%-*}"
            arch="${os_arch##*-}"
            if [ "$os" = "macos" ]; then
              # Find and rename updater archives (.app.tar.gz and .sig)
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                base="${f%.sig}"
                ext="${f#$base}"
                name="OhCanvas_0.1.0_$arch.app.tar.gz$ext"
                cp "$f" "$name"
                echo "  Copied $(basename "$f") -> $name"
              done < <(find "$dir" -name "*.app.tar.gz*" -type f 2>/dev/null)
              # Copy DMG files
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                cp "$f" .
                echo "  Copied $(basename "$f")"
              done < <(find "$dir" -name "*.dmg" -type f 2>/dev/null)
            fi
            if [ "$os" = "windows" ]; then
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                cp "$f" .
              done < <(find "$dir" -name "*.msi*" -type f 2>/dev/null)
              echo "  Copied MSI files"
            fi
            if [ "$os" = "linux" ]; then
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                cp "$f" .
              done < <(find "$dir" -name "*.deb" -type f 2>/dev/null)
              echo "  Copied DEB files"
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                cp "$f" .
              done < <(find "$dir" -name "*.AppImage*" -type f 2>/dev/null)
              echo "  Copied AppImage files"
            fi
          done
          echo "=== Files at root ==="
          ls -la *.dmg *.app.tar.gz* *.msi* 2>/dev/null || echo "(no bundle files at root)"

      - name: Generate updater metadata
        run: node .github/workflows/generate-update-json.mjs

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.dmg
            *.app.tar.gz
            *.app.tar.gz.sig
            *.msi
            *.msi.sig
            *.deb
            *.AppImage
            *.AppImage.tar.gz
            *.AppImage.tar.gz.sig
            latest-release.json
