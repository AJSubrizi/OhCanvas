name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            arch: aarch64
            bundles: "dmg,app"
          - target: x86_64-apple-darwin
            os: macos-15
            arch: x86_64
            bundles: "dmg,app"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
            bundles: msi

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm tauri build --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CXXFLAGS: "-D_LIBCPP_DISABLE_AVAILABILITY"
          CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

      - name: List bundle files
        shell: bash
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f
          echo "=== End ==="

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz*

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OhCanvas-*
          merge-multiple: true

      - name: Flatten bundle files
        run: |
          find . -type f \( -name "*.app.tar.gz*" -o -name "*.msi.zip*" -o -name "*.msi" -o -name "*.dmg" \) -exec sh -c 'cp "$1" .' _ {} \;
      - name: Generate updater metadata
        run: node .github/workflows/generate-update-json.mjs

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.dmg
            *.app.tar.gz
            *.app.tar.gz.sig
            *.msi
            *.msi.zip
            *.msi.zip.sig
            latest-release.json
