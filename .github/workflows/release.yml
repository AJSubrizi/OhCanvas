name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            arch: aarch64
            bundles: "dmg,app"
          - target: x86_64-apple-darwin
            os: macos-15
            arch: x86_64
            bundles: "dmg,app"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
            bundles: msi

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm tauri build --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.UPDATER_PRIVATE_KEY_PASSWORD }}
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CXXFLAGS: "-D_LIBCPP_DISABLE_AVAILABILITY"
          CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

      - name: List bundle files
        shell: bash
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f
          echo "=== End ==="

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz*

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OhCanvas-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OhCanvas-*
          merge-multiple: false

      - name: Flatten bundle files
        shell: bash
        run: |
          for dir in OhCanvas-*/; do
            arch="${dir#OhCanvas-}"
            arch="${arch%/}"
            case "$arch" in
              aarch64) plat="darwin-aarch64" ;;
              x86_64)  plat="darwin-x86_64" ;;
              *)       plat="$arch" ;;
            esac
            # Rename updater archives with arch info
            for f in "$dir"*.app.tar.gz*; do
              [ -f "$f" ] || continue
              base="${f%.sig}"
              ext="${f#$base}"
              name="OhCanvas_0.1.0_$arch.app.tar.gz$ext"
              cp "$f" "$name"
            done
            # Copy DMG files (already have arch in name)
            cp "$dir"*.dmg . 2>/dev/null || true
            # Copy MSI + MSI.sig (Windows)
            cp "$dir"*.msi . 2>/dev/null || true
            cp "$dir"*.msi.sig . 2>/dev/null || true
          done
          ls -la *.dmg *.app.tar.gz* *.msi* 2>/dev/null || echo "(no bundle files at root)"

      - name: Generate updater metadata
        run: node .github/workflows/generate-update-json.mjs

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.dmg
            *.app.tar.gz
            *.app.tar.gz.sig
            *.msi
            *.msi.sig
            latest-release.json
